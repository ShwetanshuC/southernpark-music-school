# Gzip compression
gzip on;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;

server {
    client_max_body_size 50m;

    # ── Django / Daphne upstream (same Lightsail host, shared localhost) ──────
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Health check (used by Lightsail) ─────────────────────────────────────
    location /healthcheck {
        add_header Content-Type text/plain;
        return 200 'Up and running!';
    }

    # ── Static files (baked into this nginx image at build time) ─────────────
    location /static/ {
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # ── Media files (try local volume first, fall back to Django/S3) ──────────
    location /media/ {
        alias /media/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri $uri/ @media_proxy;
    }

    location @media_proxy {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }
}
