# Cache zone: 10MB keys, 100MB storage, items expire after 7 days
proxy_cache_path /tmp/nginx keys_zone=mycache:10m max_size=100m inactive=7d use_temp_path=off;

# Gzip compression for all text-based responses
gzip on;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;

server {
    client_max_body_size 50m;

    # Upstream Django (Daphne)
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /healthcheck {
        add_header Content-Type text/plain;
        return 200 'Up and running!';
    }

    # Static files — long cache (WhiteNoise already fingerprints filenames)
    location /static/ {
        proxy_cache mycache;
        proxy_cache_background_update on;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_valid 200 1d;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400, immutable";
        add_header X-Cache-Status $upstream_cache_status;
    }

    # Media files — moderate cache (user-uploaded, may change)
    location /media/ {
        proxy_cache mycache;
        proxy_cache_background_update on;
        proxy_cache_use_stale updating;
        proxy_cache_valid 200 1h;
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
    }
}
