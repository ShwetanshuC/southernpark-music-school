# Cache zone: 10MB keys, 100MB storage, items expire after 7 days
proxy_cache_path /tmp/nginx keys_zone=mycache:10m max_size=100m inactive=7d use_temp_path=off;

# Gzip compression for all text-based responses
gzip on;
gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
gzip_min_length 1024;
gzip_proxied any;
gzip_vary on;

server {
    client_max_body_size 50m;

    # Upstream Django (Daphne)
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    location /healthcheck {
        add_header Content-Type text/plain;
        return 200 'Up and running!';
    }

    # Static files — serve directly from the Nginx container image for best performance.
    location /static/ {
        alias /static/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri $uri/ =404;
    }

    # Media files — serve local uploads if present, otherwise proxy to Django.
    location /media/ {
        alias /media/;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        access_log off;
        try_files $uri $uri/ @media_proxy;
    }

    location @media_proxy {
        proxy_pass http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
    }
}
