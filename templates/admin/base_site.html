{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
    /* Override Django Admin CSS Variables */
    :root {
        --primary: #c2410c; /* spms-accent */
        --secondary: #9a3412; /* spms-accent-h */
        --accent: #ea580c;
        --primary-fg: #fff;

        --body-fg: #1c1917; /* stone-900 */
        --body-bg: #fafaf9; /* stone-50 */
        --body-quiet-color: #57534e; /* stone-600 */
        --body-loud-color: #000;

        --header-color: #fff;
        --header-branding-color: #c2410c;
        --header-bg: #292524; /* stone-800 */
        --header-link-color: #fff;

        --breadcrumbs-fg: #e7e5e4; /* stone-200 */
        --breadcrumbs-link-fg: #fff;
        --breadcrumbs-bg: #c2410c; /* accent bar */

        --link-fg: #c2410c;
        --link-hover-color: #ea580c;
        --link-selected-fg: #fff;

        --hairline-color: #e7e5e4; /* stone-200 */
        --border-color: #d6d3d1; /* stone-300 */

        --error-fg: #dc2626;

        --message-success-bg: #16a34a;
        --message-warning-bg: #eab308;
        --message-error-bg: #dc2626;

        --darkened-bg: #f5f5f4; /* stone-100 */
        --selected-bg: #fcd34d;
        --selected-row: #ffedd5; /* orange-50 */

        --button-fg: #fff;
        --button-bg: #c2410c;
        --button-hover-bg: #9a3412;
        --default-button-bg: #1c1917;
        --default-button-hover-bg: #292524;

        font-family: 'Poppins', sans-serif !important;
    }

    /* Additional Overrides */
    body {
        font-family: 'Poppins', sans-serif;
    }
    #header {
        border-bottom: 2px solid var(--primary);
    }
    #branding h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.8rem;
        font-weight: 700;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .module h2, .module caption, .inline-group h2 {
        background: var(--darkened-bg);
        color: var(--body-fg);
        border-bottom: 2px solid var(--primary);
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 600;
        font-size: 1.25rem;
    }
    a.section:link, a.section:visited {
        color: var(--body-fg);
    }
    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        border-radius: 9999px; /* full rounded like book trial button */
        padding: 0.6rem 1.25rem;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        transition: all 0.2s ease;
    }
    .submit-row input.default {
        background-color: var(--primary);
    }
    .submit-row input.default:hover {
        background-color: var(--secondary);
    }
    #branding img.logo {
        height: 40px;
        width: auto;
    }
    .help, p.help {
        font-size: 0.85rem;
        color: var(--body-quiet-color);
    }
    /* Enlarge the inputs slightly for older users */
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], select, textarea {
        padding: 0.5rem 0.75rem;
        font-size: 1.05rem;
        border-radius: 0.375rem;
        border: 1px solid var(--border-color);
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    /* Larger checkboxes for accessibility */
    input[type=checkbox] {
        width: 1.5rem;
        height: 1.5rem;
    }
    
    /* Bigger text in list view */
    td, th {
        font-size: 0.95rem;
    }
    
    #content h1 {
        font-family: 'Playfair Display', Georgia, serif;
    }
</style>
{% endblock %}

{% block branding %}
<h1 id="site-name">
    <a href="{% url 'admin:index' %}" style="display: flex; align-items: center; gap: 10px;">
        <img src="{% static 'images/SPMS_542_icon.gif' %}" alt="SPMS logo" class="logo" />
        Southern Park Admin
    </a>
</h1>
{% endblock %}

{% block nav-global %}{% endblock %}
