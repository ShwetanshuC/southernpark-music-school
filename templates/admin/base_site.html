{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | {{ site_title|default:_('Django site admin') }}{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
<style>
    /* Premium Southern Park Dark Theme Overrides */
    :root {
        --primary: #c2410c; /* spms-accent orange */
        --secondary: #9a3412; /* spms-accent-h deep orange */
        --accent: #ea580c;
        --primary-fg: #fff;

        /* Body Background & Foreground */
        --body-bg: #1c1917; /* stone-900 */
        --body-fg: #e7e5e4; /* stone-200 */
        --body-quiet-color: #a8a29e; /* stone-400 */
        --body-loud-color: #fff;

        /* Header (Top Nav) */
        --header-bg: #110f0e; /* deeper black-stone */
        --header-color: #fff;
        --header-branding-color: #c2410c;
        --header-link-color: #d6d3d1;

        /* Breadcrumbs Bar */
        --breadcrumbs-bg: #292524; /* stone-800 */
        --breadcrumbs-fg: #d6d3d1;
        --breadcrumbs-link-fg: #fff;

        /* Links */
        --link-fg: #f97316; /* orange-500 */
        --link-hover-color: #fb923c;
        --link-selected-fg: #fff;

        /* Borders / Hairlines */
        --hairline-color: #44403c; /* stone-700 */
        --border-color: #57534e; /* stone-600 */

        /* Logic Flags */
        --error-fg: #ef4444;
        --message-success-bg: #15803d;
        --message-warning-bg: #ca8a04;
        --message-error-bg: #b91c1c;

        /* Modules & Cards */
        --darkened-bg: #292524; /* stone-800 for module titles */
        --selected-bg: #292524;
        --selected-row: #44403c; /* stone-700 for hover row */

        /* Buttons */
        --button-fg: #fff;
        --button-bg: #c2410c;
        --button-hover-bg: #9a3412;
        --default-button-bg: #44403c;
        --default-button-hover-bg: #57534e;

        font-family: 'Poppins', sans-serif !important;
    }

    /* Core Layout Dark Mode Tweaks */
    body {
        background-color: var(--body-bg);
        color: var(--body-fg);
        font-family: 'Poppins', sans-serif;
    }
    
    #header {
        background: var(--header-bg);
        color: var(--header-color);
        padding: 10px 40px;
        border-bottom: 2px solid var(--primary);
    }
    
    #branding h1 {
        font-family: 'Playfair Display', Georgia, serif;
        font-weight: 700;
        font-size: 1.5rem;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 12px;
    }
    
    #branding h1 a {
        color: #fff;
    }
    
    #branding img.logo {
        height: 32px;
        width: auto;
    }

    /* Fix the "White on White" Contrast Issues */
    /* Header labels in the main admin dashboard */
    .module h2, .module caption, .inline-group h2 {
        background: #292524 !important; /* stone-800 */
        color: #fff !important; /* Forces white on dark high contrast */
        border-bottom: 2px solid var(--primary);
        font-family: 'Playfair Display', Georgia, serif;
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 12px 15px;
    }
    
    div.breadcrumbs {
        padding: 12px 40px;
        background: var(--breadcrumbs-bg);
        color: var(--breadcrumbs-fg);
        border-bottom: 1px solid var(--hairline-color);
    }
    
    div.breadcrumbs a {
        color: var(--breadcrumbs-link-fg);
        font-weight: 500;
    }
    
    #content h1 {
        font-family: 'Playfair Display', Georgia, serif;
        color: #fff;
        font-weight: 700;
        margin-bottom: 24px;
        font-size: 2rem;
    }

    /* Tables */
    table th, table td {
        background: transparent !important;
        color: var(--body-fg);
        border-bottom: 1px solid var(--hairline-color);
    }
    
    table thead th {
        background: #292524 !important;
        color: #fff;
        font-weight: 600;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 0.05em;
    }
    
    tr.row1, tr.row2 {
        background: #1c1917 !important;
    }
    
    tr:hover td, tr:hover th {
        background: #44403c !important; /* stone-700 row hover */
    }

    /* Forms */
    .module {
        background: #292524;
        border: 1px solid var(--hairline-color);
        border-radius: 12px;
        overflow: hidden;
        margin-bottom: 30px;
    }
    
    fieldset.module {
        padding: 0;
    }
    
    .form-row {
        padding: 15px 20px;
        border-bottom: 1px solid var(--hairline-color);
    }
    
    input[type=text], input[type=password], input[type=email], input[type=url], input[type=number], select, textarea {
        background-color: #110f0e !important;
        color: #fff !important;
        border: 1px solid var(--border-color) !important;
        padding: 10px 14px !important;
        border-radius: 8px !important;
        font-size: 1rem !important;
    }
    
    input[type=text]:focus, select:focus, textarea:focus {
        border-color: var(--primary) !important;
        outline: none;
        box-shadow: 0 0 0 2px rgba(194, 65, 12, 0.2);
    }

    /* Buttons */
    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        border-radius: 9999px; 
        padding: 10px 24px;
        font-weight: 600;
        background: var(--button-bg);
        color: #fff;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
    }
    
    .submit-row {
        background: #110f0e;
        border: none;
        border-radius: 0 0 12px 12px;
        padding: 20px;
    }
    
    .submit-row input.default {
        background: var(--primary);
    }
    
    .submit-row input.default:hover {
        background: var(--secondary);
    }
    
    .submit-row a.deletelink {
        border-radius: 9999px;
        padding: 10px 24px;
        background: transparent;
        color: var(--error-fg);
        border: 1px solid var(--error-fg);
    }
    
    .submit-row a.deletelink:hover {
        background: var(--error-fg);
        color: #fff;
    }

    /* Help text */
    .help, p.help {
        color: var(--body-quiet-color);
        font-style: italic;
    }

    /* Hide the default Django color inputs if they look ugly */
    input[type=color] {
        width: 60px;
        height: 60px;
        border-radius: 12px;
        border: 2px solid var(--border-color);
        padding: 0;
        cursor: pointer;
    }

    /* Sidebar / Navigation */
    #content-main {
        padding: 40px;
    }

    /* Login Centering Fix */
    body.login {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        min-height: 100dvh !important;
        background: #110f0e !important;
        margin: 0 !important;
        padding: 20px !important;
    }
    
    .login #container {
        width: 100% !important;
        max-width: 440px !important;
        background: #1c1917 !important;
        border: 1px solid #44403c !important;
        border-radius: 16px !important;
        overflow: hidden !important;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7) !important;
        margin: 0 !important;
    }
    
    .login #header {
        background: transparent !important;
        border: none !important;
        border-bottom: 1px solid var(--primary) !important;
        text-align: center !important;
        padding: 30px !important;
    }
    
    .login #branding h1 {
        justify-content: center !important;
    }
    
    .login #content {
        padding: 30px 40px !important;
    }
    
    .login .form-row {
        background: transparent !important;
        border: none !important;
        padding: 15px 0 !important;
    }
    
    .login .submit-row {
        background: transparent !important;
        padding: 20px 0 0 0 !important;
        text-align: center !important;
    }
    
    .login .submit-row input {
        width: 100% !important;
        padding: 14px !important;
        font-size: 1rem !important;
    }

    /* Cropper Preview Styles */
    .live-crop-preview-wrapper {
        margin-top: 15px;
        max-width: 600px;
        border: 2px dashed #44403c;
        border-radius: 8px;
        padding: 10px;
        background: #110f0e;
        display: none;
    }
    
    .live-crop-preview-img {
        max-width: 100%;
        display: block;
    }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Live Cropper Implementation
    const fileInputs = document.querySelectorAll('input[type="file"]');
    
    fileInputs.forEach(input => {
        // Find if this input is related to a cropping field
        const row = input.closest('.form-row');
        if (!row) return;
        
        // We look for a related ImageRatioField by checking if the next row has a jcrop container or by naming convention
        // Actually, we'll just check if there's a field ending in '-cropping' in the same form
        const fieldName = input.name;
        const form = input.form;
        if (!form) return;
        
        input.addEventListener('change', function(e) {
            if (!this.files || !this.files[0]) return;
            
            const file = this.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                // Create preview element if not exists
                let wrapper = row.querySelector('.live-crop-preview-wrapper');
                if (!wrapper) {
                    wrapper = document.createElement('div');
                    wrapper.className = 'live-crop-preview-wrapper';
                    wrapper.innerHTML = '<p style="color:var(--primary); font-size: 0.8rem; margin-bottom: 8px; font-weight: bold;">LIVE PREVIEW & CROP (Adjust before saving)</p><img class="live-crop-preview-img">';
                    row.appendChild(wrapper);
                }
                
                const img = wrapper.querySelector('img');
                img.src = event.target.result;
                wrapper.style.display = 'block';
                
                // Initialize Cropper.js
                if (window.currentCropper) window.currentCropper.destroy();
                
                // Try to find the target cropping fields (box_coords)
                // django-image-cropping hidden inputs are usually name + "_cropping"
                const targetField = form.querySelector(`input[name="${fieldName}_cropping"]`);
                
                window.currentCropper = new Cropper(img, {
                    aspectRatio: 16/9, // Default for Hero, we could parse this from the field data if needed
                    viewMode: 1,
                    crop(event) {
                        if (targetField) {
                            // Update the hidden field with the new coordinates
                            // Format: x1,y1,x2,y2
                            const x1 = Math.round(event.detail.x);
                            const y1 = Math.round(event.detail.y);
                            const x2 = Math.round(event.detail.x + event.detail.width);
                            const y2 = Math.round(event.detail.y + event.detail.height);
                            targetField.value = `${x1},${y1},${x2},${y2}`;
                        }
                    }
                });
            };
            
            reader.readAsDataURL(file);
        });
    });
});
</script>
{% endblock %}

    <a href="{% url 'admin:index' %}">
        <img src="{% static 'images/SPMS_542_icon.gif' %}" alt="SPMS logo" class="logo" />
        Southern Park Admin
    </a>
</h1>
