{% extends "admin/change_list.html" %}
{% load i18n admin_urls %}

{% block object-tools %}
<ul class="object-tools" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
    <li style="float:none;">
        <a href="reorder/" class="addlink spms-arrange-btn">
            &#8759; Arrange Faculty
        </a>
    </li>
    {% if has_add_permission %}
    <li style="float:none;">
        {% url cl.opts|admin_urlname:'add' as add_url %}
        <a href="{% add_preserved_filters add_url is_popup to_field_value %}" class="addlink">
            Add Faculty Member +
        </a>
    </li>
    {% endif %}
</ul>
<style>
/* Arrange button inherits addlink style; override only the icon spacing */
.spms-arrange-btn { text-decoration: none !important; }
.object-tools { display: flex !important; align-items: center !important; gap: 8px !important; }
.object-tools li { float: none !important; margin: 0 !important; }
</style>
{% endblock %}
