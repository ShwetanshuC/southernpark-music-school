{% extends "admin/change_list.html" %}
{% load i18n admin_urls %}

{% block object-tools %}
<ul class="object-tools">
    <li>
        <a href="reorder/" class="spms-arrange-btn">
            &#8759;&nbsp; Arrange Faculty
        </a>
    </li>
    {% if has_add_permission %}
    <li>
        {% url cl.opts|admin_urlname:'add' as add_url %}
        <a href="{% add_preserved_filters add_url is_popup to_field_value %}" class="addlink">
            Add Faculty Member
        </a>
    </li>
    {% endif %}
</ul>
<style>
.spms-arrange-btn {
    display: inline-flex;
    align-items: center;
    background: #44403c !important;
    color: #e7e5e4 !important;
    border-radius: 9999px !important;
    padding: 10px 22px !important;
    font-weight: 600 !important;
    font-size: 0.85rem !important;
    letter-spacing: 0.03em !important;
    text-decoration: none !important;
    transition: background 0.2s, transform 0.15s !important;
    border: 1px solid #57534e !important;
}
.spms-arrange-btn:hover {
    background: #57534e !important;
    transform: translateY(-1px) !important;
    color: #fff !important;
}
</style>
{% endblock %}
